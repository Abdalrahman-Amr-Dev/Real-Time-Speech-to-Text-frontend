<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceFlow - Neural Voice Transcription System</title>
    <link rel="icon" type="image/png" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Animated Particle Background -->
    <canvas id="particleCanvas" class="particle-background"></canvas>

    <!-- Main Content -->
    <div class="app-container">
      <!-- Header -->
      <header class="app-header">
        <div class="header-content">
          <div class="header-title">
            <div class="status-indicator-header">
              <div class="pulse-dot"></div>
            </div>
            <h1>VoiceFlow</h1>
          </div>
          <p class="header-subtitle">Neural Voice Transcription System</p>
        </div>
      </header>

      <!-- Main -->
      <main class="app-main">
        <div class="content-grid">
          <!-- Control Section -->
          <section class="control-panel">
            <div class="control-content">
              <!-- Recording Circle -->
              <div class="recording-circle" id="recordingCircle">
                <svg
                  class="mic-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M12 1a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"
                  ></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <line x1="12" y1="19" x2="12" y2="23"></line>
                  <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
              </div>

              <!-- Time Display -->
              <div class="time-display">
                <div class="time-value" id="recordingTime">00:00</div>
                <div class="recording-status">
                  <span class="status-dot" id="statusDot"></span>
                  <span class="status-text" id="statusText"
                    >Ready to Record</span
                  >
                </div>
              </div>

              <!-- Control Buttons -->
              <div class="button-group">
                <button
                  id="startBtn"
                  class="btn btn-start"
                  onclick="startRecording()"
                >
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                      d="M12 1a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"
                    />
                  </svg>
                  Start Recording
                </button>
                <button
                  id="stopBtn"
                  class="btn btn-stop"
                  onclick="stopRecording()"
                  disabled
                >
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="4" width="12" height="16" />
                  </svg>
                  Stop
                </button>
                <!-- <button
                  id="clearBtn"
                  class="btn btn-clear"
                  onclick="clearBuffer()"
                  disabled
                >
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path
                      d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                    ></path>
                  </svg>
                </button> -->
              </div>
            </div>
          </section>

          <!-- Stats Section -->
          <section class="stats-panel">
            <div class="stat-card">
              <div class="stat-value" id="wordCount">0</div>
              <div class="stat-label">Words</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="charCount">0</div>
              <div class="stat-label">Characters</div>
            </div>
          </section>

          <!-- Transcript Section -->
          <section class="transcript-panel">
            <div class="transcript-header">
              <div class="transcript-title">
                <span class="live-indicator"></span>
                <h3>Live Transcript</h3>
              </div>
              <div class="transcript-actions">
                <button
                  id="copyBtn"
                  class="action-btn"
                  onclick="copyToClipboard()"
                  disabled
                  title="Copy to clipboard"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                    ></path>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                  </svg>
                </button>
                <button
                  id="downloadBtn"
                  class="action-btn"
                  onclick="downloadTranscript()"
                  disabled
                  title="Download transcript"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                </button>
              </div>
            </div>
            <div class="transcript-content" id="transcriptContent">
              <div class="empty-state">
                <svg class="empty-icon" viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M12 1a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"
                  />
                </svg>
                <p>Start recording to begin transcription</p>
                <p class="empty-hint">
                  Your words will appear here in real-time
                </p>
              </div>
            </div>
          </section>
        </div>
      </main>

      <!-- Footer -->
      <footer class="app-footer">
        <div class="footer-content">
          <div class="footer-info">Powered by VoiceFlow AI Engine</div>
          <div class="footer-credits">
            <div>Developed by</div>
            <div class="credits">
              Abdulrahman Amr Eissa · Mohamed Mahmoud Helmy · Omar Ahmed Rezk
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
